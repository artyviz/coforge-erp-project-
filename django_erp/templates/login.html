{% extends "base.html" %}

{% block title %}Login - University ERP{% endblock %}

{% block content %}
{% with hide_sidebar=True %}
<div class="login-container">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div class="avatar" style="width: 60px; height: 60px; font-size: 1.5rem; margin: 0 auto 1rem;"><i
                class="fas fa-lock"></i></div>
        <h2 style="font-weight: 800; color: var(--primary);">Welcome Back</h2>
        <p style="color: var(--text-muted);">Please sign in to continue</p>
    </div>

    {% if error %}
    <div class="error-msg">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
        Forgot password? Contact IT Support.
    </p>
</div>
{% endwith %}
{% endblock %}
