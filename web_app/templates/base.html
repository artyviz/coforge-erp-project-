<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}University ERP{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <h2>University ERP</h2>
            <nav>
                <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/students" class="{% if page == 'students' %}active{% endif %}">Students</a>
                <a href="/courses" class="{% if page == 'courses' %}active{% endif %}">Courses</a>
                <a href="/faculty" class="{% if page == 'faculty' %}active{% endif %}">Faculty</a>
                <a href="/enrollments" class="{% if page == 'enrollments' %}active{% endif %}">Enrollments</a>
                <a href="/departments" class="{% if page == 'departments' %}active{% endif %}">Departments</a>
            </nav>

            {% if user %}
            <div style="border-top:1px solid #d0d7de;margin-top:auto;padding:12px 16px;">
                <div style="font-size:13px;font-weight:600;">{{ user.full_name or user.username }}</div>
                <div style="font-size:12px;color:#57606a;">{{ user.role }}</div>
                <a href="/logout" style="font-size:12px;color:#cf222e;margin-top:4px;display:inline-block;">Sign out</a>
            </div>
            {% endif %}
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
