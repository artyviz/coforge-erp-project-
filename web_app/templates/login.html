<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — University ERP</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f6f8fa;">
        <div style="width:360px;background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:24px;">
            <h2 style="text-align:center;margin-bottom:4px;">University ERP</h2>
            <p style="text-align:center;color:#57606a;font-size:13px;margin-bottom:20px;">Sign in to your account</p>

            {% if error %}
            <div
                style="background:#ffebe9;border:1px solid #ff8182;color:#82071e;padding:8px 12px;border-radius:6px;margin-bottom:16px;font-size:13px;">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;margin-top:4px;">Sign in</button>
            </form>

            <p style="text-align:center;margin-top:16px;font-size:13px;color:#57606a;">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </div>
    </div>
</body>

</html>
